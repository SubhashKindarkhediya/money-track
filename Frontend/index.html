<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png?v=7" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Money Track | Manage Your Credit & Debit</title>
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #6366f1 0%, #4f46e5 50%, #3730a3 100%);
      z-index: 9999;
      transition: opacity 0.5s ease-out;
      gap: 24px;
    }

    #splash-logo-container {
      width: 140px;
      height: 140px;
      border-radius: 32px;
      overflow: hidden;
      animation: pulse 2s infinite ease-in-out;
      background: #4338ca;
    }

    #splash-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 32px;
      display: block;
    }

    #splash-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    #splash-tagline {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: -16px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="splash-screen">
      <div id="splash-logo-container">
        <img id="splash-logo" src="/logo.png" alt="Money Track" />
      </div>
      <span id="splash-title">Money Track</span>
      <span id="splash-tagline">Manage Your Finances</span>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
