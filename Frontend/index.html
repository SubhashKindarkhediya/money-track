<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png?v=7" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Money Track | Manage Your Credit & Debit</title>
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
      gap: 20px;
    }

    .dark #splash-screen {
      background: #0f172a;
    }

    #splash-logo-container {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
      animation: pulse 2s infinite ease-in-out;
      overflow: hidden;
    }

    #splash-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
    }

    #splash-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.05em;
    }

    .dark #splash-title {
      color: #f1f5f9;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 25px 70px rgba(99, 102, 241, 0.6);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="splash-screen">
      <div id="splash-logo-container">
        <img id="splash-logo" src="/logo.png" alt="Money Track" />
      </div>
      <span id="splash-title">Money Track</span>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
